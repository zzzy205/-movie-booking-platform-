version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8001}
      - REACT_APP_WS_URL=${REACT_APP_WS_URL:-ws://localhost:8001}
    depends_on:
      - backend
    networks:
      - movie-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/app/data
      - ./backend/uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=8000
      - DB_PATH=/app/data/users.json
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-dev}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      - nginx
    networks:
      - movie-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - movie-network

networks:
  movie-network:
    driver: bridge
